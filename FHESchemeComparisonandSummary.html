</tr><tr id='TBL-147-11-'><td class='td11' id='TBL-147-11-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-11-2' style='text-align:left; white-space:nowrap;'>   , where <!-- l. 409 --><math display='inline'><mrow><mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover> ≡1<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <msup><mrow>p</mrow><mrow>𝜀</mrow></msup></mrow></math>                                                                                                                                                                                                                                                                                                                                                                                                                                                                           </td>
</tr><tr id='TBL-147-12-'><td class='td11' id='TBL-147-12-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-12-2' style='text-align:left; white-space:nowrap;'> 2. <span class='underline'>Ciphertext Coefficient Multiplication by <!-- l. 410 --><math display='inline'><msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup></math></span>:                                                                                                                                                                                                                                                                                                                                                                                        </td>
</tr><tr id='TBL-147-13-'><td class='td11' id='TBL-147-13-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-13-2' style='text-align:left; white-space:nowrap;'>    Compute <!-- l. 411 --><math display='inline'><mrow>(<msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup><mover accent='true'><mrow>A</mrow><mo accent='true' stretchy='false'>^</mo></mover>,<msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup><mover accent='true'><mrow>B</mrow><mo accent='true' stretchy='false'>^</mo></mover>) = (<msup><mrow>A</mrow><mrow>′</mrow></msup>,<msup><mrow>B</mrow><mrow>′</mrow></msup>)<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover></mrow></math> (where <!-- l. 411 --><math display='inline'><mrow><mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover> ≡1<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <msup><mrow>p</mrow><mrow>𝜀</mrow></msup></mrow></math>)                                                                                                                                                                                                                                                                                    </td>
</tr><tr id='TBL-147-14-'><td class='td11' id='TBL-147-14-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-14-2' style='text-align:left; white-space:nowrap;'>   , which the ciphertext <!-- l. 412 --><math display='inline'><mrow><msub><mrow><mstyle class='text'><mtext class='textsf' mathvariant='sans-serif'>𝖱𝖫𝖶𝖤</mtext></mstyle></mrow><mrow>S,σ</mrow></msub>(<msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup>M)<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover></mrow></math> with noise <!-- l. 412 --><math display='inline'><mrow><msup><mrow>p</mrow><mrow>𝜀</mrow></msup>E</mrow></math>.                                                                                                                                                                                                                                                                </td>
</tr><tr id='TBL-147-15-'><td class='td11' id='TBL-147-15-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-15-2' style='text-align:left; white-space:nowrap;'> 3. <span class='underline'><span class='rm-lmss-10x-x-109'>ModRaise</span></span>: <!-- l. 413 --><math display='inline'><mrow>(<msup><mrow>A</mrow><mrow>′</mrow></msup>,<msup><mrow>B</mrow><mrow>′</mrow></msup>)<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover> →(<msup><mrow>A</mrow><mrow>′</mrow></msup>,<msup><mrow>B</mrow><mrow>′</mrow></msup>)<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <msub><mrow>q</mrow><mrow>L</mrow></msub></mrow></math>                                                                                                                                                                                                                                                                                                                                                                                                                                                                       </td>
</tr><tr id='TBL-147-16-'><td class='td11' id='TBL-147-16-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-16-2' style='text-align:left; white-space:nowrap;'>    , which is the ciphertext <!-- l. 414 --><math display='inline'><mrow><msub><mrow><mstyle class='text'><mtext class='textsf' mathvariant='sans-serif'>𝖱𝖫𝖶𝖤</mtext></mstyle></mrow><mrow>S,σ</mrow></msub>(<msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup>M + <msup><mrow>p</mrow><mrow>𝜀</mrow></msup>E + <msup><mrow>K</mrow><mrow>′</mrow></msup><mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover>)<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <msub><mrow>q</mrow><mrow>L</mrow></msub></mrow></math>.                                                                                                                                                                                                                                                                                                                                                                                                            </td>
</tr><tr id='TBL-147-17-'><td class='td11' id='TBL-147-17-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-17-2' style='text-align:left; white-space:nowrap;'> 4. <span class='underline'><span class='rm-lmss-10x-x-109'>CoeffToSlot</span></span>: Multiply to the ciphertext by <!-- l. 415 --><math display='inline'><mrow><msup><mrow>n</mrow><mrow>−1</mrow></msup> ⋅<msubsup><mrow>I</mrow><mrow>n</mrow><mrow>R</mrow></msubsup> ⋅<mover accent='true'><mrow>W</mrow><mo accent='true' stretchy='false'>~</mo></mover></mrow></math> to move                                                                                                                                                                                                                                                                                                                                                                          </td>
</tr><tr id='TBL-147-18-'><td class='td11' id='TBL-147-18-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-18-2' style='text-align:left; white-space:nowrap;'>    the plaintext coefficients of <!-- l. 416 --><math display='inline'><mrow><msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup>M + <msup><mrow>p</mrow><mrow>𝜀</mrow></msup>E + <msup><mrow>K</mrow><mrow>′</mrow></msup><mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover></mrow></math> to the input slots.                                                                                                                                                                                                                                                                                                                                                                                </td>
</tr><tr id='TBL-147-19-'><td class='td11' id='TBL-147-19-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-19-2' style='text-align:left; white-space:nowrap;'> 5. <span class='underline'>Digit Extraction</span>: Given the digit extraction polynomial <!-- l. 417 --><math display='inline'><mrow><msub><mrow>G</mrow><mrow>𝜀</mrow></msub>(x)</mrow></math>,                                                                                                                                                                                                                                                                                                                                                                   </td>
</tr><tr id='TBL-147-20-'><td class='td11' id='TBL-147-20-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-20-2' style='text-align:left; white-space:nowrap;'>    homomorphically compute:                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           </td>
</tr><tr id='TBL-147-21-'><td class='td11' id='TBL-147-21-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-21-2' style='text-align:left; white-space:nowrap;'>    <!-- l. 419 --><math display='inline'><mrow><mstyle mathvariant='bold'><mtext mathvariant='bold'>(</mtext></mstyle><mstyle class='text'><mtext> </mtext></mstyle><msub><mrow>G</mrow><mrow>2</mrow></msub> ∘<msub><mrow>G</mrow><mrow>3</mrow></msub> ∘⋯ ∘<msub><mrow>G</mrow><mrow>𝜀</mrow></msub>(<msup><mrow>p</mrow><mrow>𝜀−1</mrow></msup>M + <msup><mrow>p</mrow><mrow>𝜀</mrow></msup>E + <msup><mrow>K</mrow><mrow>′</mrow></msup><mover accent='true'><mrow>q</mrow><mo accent='true' stretchy='false'>^</mo></mover>)<mstyle class='text'><mtext> </mtext></mstyle><mstyle mathvariant='bold'><mtext mathvariant='bold'>)</mtext></mstyle></mrow></math>                                                                                                                                                                                                                                                                                                                                                                                                                                             </td>
</tr><tr id='TBL-147-22-'><td class='td11' id='TBL-147-22-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-22-2' style='text-align:left; white-space:nowrap;'>    , and then the output <!-- l. 420 --><math display='inline'><mrow>M + <msup><mrow>K</mrow><mrow><mi>″</mi></mrow></msup>p</mrow></math> is stored in the plaintext slots.                                                                                                                                                                                                                                                                                                                                                                       </td>
</tr><tr id='TBL-147-23-'><td class='td11' id='TBL-147-23-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-23-2' style='text-align:left; white-space:nowrap;'>    To handle inverse-<!-- l. 421 --><math display='inline'>p</math> multiplication in each <!-- l. 421 --><math display='inline'>i</math>-th round, multiply <!-- l. 421 --><math display='inline'><mrow>|<msup><mrow>p</mrow><mrow>−1</mrow></msup><msub><mrow>|</mrow><mrow><msup><mrow>q</mrow><mrow>⟨i⟩</mrow></msup></mrow></msub></mrow></math> to all                                                                                   </td>
</tr><tr id='TBL-147-24-'><td class='td11' id='TBL-147-24-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-24-2' style='text-align:left; white-space:nowrap;'>    ciphertext polynomial coefficients to update their plaintext portion from                                                                                                                                                                                                                                                                                                                                                                                                                                                                               </td>
</tr><tr id='TBL-147-25-'><td class='td11' id='TBL-147-25-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-25-2' style='text-align:left; white-space:nowrap;'>    <!-- l. 423 --><math display='inline'><mrow>M<msup><mrow>p</mrow><mrow>𝜀−i</mrow></msup> + <msup><mrow>K</mrow><mrow><mi>‴</mi></mrow></msup><msup><mrow>p</mrow><mrow>𝜀−i+1</mrow></msup><mspace width='0.3em'></mspace>(mod<mspace width='0.3em'></mspace><msup><mrow>q</mrow><mrow>⟨i⟩</mrow></msup>)</mrow></math> to <!-- l. 423 --><math display='inline'><mrow><msup><mrow>M</mrow><mrow>𝜀−i−1</mrow></msup> + <msup><mrow>K</mrow><mrow>⟨i⟩</mrow></msup><msup><mrow>p</mrow><mrow>𝜀−i</mrow></msup><mspace width='0.3em'></mspace>(mod<mspace width='0.3em'></mspace><msup><mrow>q</mrow><mrow>⟨i⟩</mrow></msup>)</mrow></math>                                                                                                                                                                                                                                                                                                        </td>
</tr><tr id='TBL-147-26-'><td class='td11' id='TBL-147-26-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-26-2' style='text-align:left; white-space:nowrap;'>    <span style='color:#FF0000;'> <!-- l. 424 --><math display='inline'>▹</math>where <!-- l. 424 --><math display='inline'><msup><mrow>q</mrow><mrow>⟨i⟩</mrow></msup></math> is the ciphertext modulus at each specific round</span>                                                                                                                                                                                                                                  </td>
</tr><tr id='TBL-147-27-'><td class='td11' id='TBL-147-27-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-27-2' style='text-align:left; white-space:nowrap;'> 6. <span class='underline'><span class='rm-lmss-10x-x-109'>SlotToCoeff</span></span>: Multiply to the ciphertext by <!-- l. 425 --><math display='inline'><msup><mrow><mover accent='true'><mrow>W</mrow><mo accent='true' stretchy='false'>~</mo></mover></mrow><mrow>∗</mrow></msup></math> to move <!-- l. 425 --><math display='inline'><mrow>M + <msup><mrow>K</mrow><mrow>⟨𝜀−1⟩</mrow></msup>p</mrow></math> to the                                                                                                                                                                                                                                </td>
</tr><tr id='TBL-147-28-'><td class='td11' id='TBL-147-28-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-28-2' style='text-align:left; white-space:nowrap;'>    polynomial coefficient positions to get <!-- l. 426 --><math display='inline'><mrow><msub><mrow><mstyle class='text'><mtext class='textsf' mathvariant='sans-serif'>𝖱𝖫𝖶𝖤</mtext></mstyle></mrow><mrow>S,σ</mrow></msub>(M + <msup><mrow>K</mrow><mrow>⟨<mstyle class='text'><mtext class='textit' mathvariant='italic'>𝑙𝑎𝑠𝑡</mtext></mstyle>⟩</mrow></msup>p)</mrow></math>                                                                                                                                                                                                                                                                                                                                                                                           </td>
</tr><tr id='TBL-147-29-'><td class='td11' id='TBL-147-29-1' style='text-align:center; white-space:nowrap;'>        </td><td class='td11' id='TBL-147-29-2' style='text-align:left; white-space:nowrap;'>    <!-- l. 427 --><math display='inline'><mrow> =<msub><mrow> <mstyle class='text'><mtext class='textsf' mathvariant='sans-serif'>𝖱𝖫𝖶𝖤</mtext></mstyle></mrow><mrow>S,σ</mrow></msub>(M + <mi mathvariant='normal'>Δ</mi><msup><mrow>K</mrow><mrow>⟨<mstyle class='text'><mtext class='textit' mathvariant='italic'>𝑙𝑎𝑠𝑡</mtext></mstyle>⟩</mrow></msup>)<mspace width='0.2em'></mspace> mod<mspace width='0.2em'></mspace> <msub><mrow>q</mrow><mrow><msup><mrow>l</mrow><mrow>′</mrow></msup></mrow></msub></mrow></math> <span style='color:#FF0000;'> <!-- l. 427 --><math display='inline'>▹</math>where <!-- l. 427 --><math display='inline'><mrow><mi mathvariant='normal'>Δ</mi> = p</mrow></math>, and the final noise is <!-- l. 427 --><math display='inline'><msup><mrow>K</mrow><mrow>⟨<mstyle class='text'><mtext class='textit' mathvariant='italic'>𝑙𝑎𝑠𝑡</mtext></mstyle>⟩</mrow></msup></math></span> </td>
</tr><tr class='hline'><td></td><td></td></tr></table>                                                                                                                                                                                                                                                                                                                                                                                                          </div>
